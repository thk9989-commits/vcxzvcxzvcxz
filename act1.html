<!-- IMAGE -->

<div id="image-container">
<img id="boss-image" src="hacker.png" alt="Hacker Image">
</div>

<script>

// Image debug
const img = document.getElementById("boss-image");

img.onerror = function(){
    console.log("Image failed to load. Check filename and folder.");
    document.getElementById("image-container").innerHTML =
    "<span style='color:red'>IMAGE NOT FOUND</span>";
};

img.onload = function(){
    console.log("Image loaded successfully.");
};

</script>
