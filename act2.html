<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Act Two - System Breach</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff41;
    font-family:monospace;
    padding:40px;
    overflow:hidden;
}

/* Terminal Box */
#terminal{
    border:1px solid #00ff41;
    padding:20px;
    height:80vh;
    overflow:auto;
    white-space:pre-wrap;
}

/* Input */
input{
    background:black;
    border:1px solid #00ff41;
    color:#00ff41;
    font-family:monospace;
    padding:8px;
    width:300px;
}

/* Wrong answer */
.wrong{
    color:red;
}
</style>
</head>
<body>

<h2>SYSTEM BREACH DETECTED</h2>

<div id="terminal"></div>

<div id="input-area" style="display:none;">
    <div>> STABILIZE CORE:</div>
    <input type="text" id="answer-input">
</div>

<script>

const terminal = document.getElementById("terminal");
const inputArea = document.getElementById("input-area");
const input = document.getElementById("answer-input");

/* Logs that type slowly */

const logs = [
"ACCESS GRANTED...",
"LOADING CORE DATA...",
"RETRIEVING SCENARIO...",
"BLACKLISTING USERS...",
"FIREWALL DISABLED...",
"DECRYPTING FILES...",
"INITIALIZING COUNTERMEASURES..."
];

let index = 0;

function typeLogs(){
    if(index < logs.length){
        terminal.innerHTML += logs[index] + "\n";
        index++;
        setTimeout(typeLogs,800);
    }else{
        showInput();
    }
}

function showInput(){
    inputArea.style.display="block";
    input.focus();
}

/* Example answer check */

input.addEventListener("keydown", function(e){
    if(e.key === "Enter"){

        if(input.value.trim().toLowerCase() === "stabilize"){
            terminal.innerHTML += "\nCORE STABILIZED.\n";
            inputArea.style.display="none";
        }else{
            terminal.innerHTML += "\nWRONG COMMAND.\n";
            input.classList.add("wrong");

            setTimeout(()=>{
                input.classList.remove("wrong");
            },500);
        }

        input.value="";
    }
});

window.onload = typeLogs;

</script>

</body>
</html>
