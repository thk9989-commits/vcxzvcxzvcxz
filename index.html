<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        #terminal-overlay {
            color: #ffffff; 
            font-size: 20px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
        }
        canvas { 
            max-width: 90vw; 
            max-height: 80vh; 
            box-shadow: 0 0 40px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div id="terminal-overlay">SYSTEM: STANDBY...</div>
    <canvas id="doorCanvas"></canvas>

<script>
    const canvas = document.getElementById('doorCanvas');
    const ctx = canvas.getContext('2d');
    const dialogue = document.getElementById('terminal-overlay');
    const img = new Image();
    
    // The "?t=" part forces the browser to ignore the old green version
    img.src = 'door.webp?t=' + new Date().getTime(); 

    const messages = [
        "CAUTION: SECURITY BYPASS INITIATED",
        "DEACTIVATING FIREWALL...",
        "ENCRYPTION KEY ACCEPTED",
        "RECONSTRUCTING COLOR DATA...",
        "GATEWAY REVEALED"
    ];

    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        let currentY = 0;
        let msgIndex = 0;
        
        function render() {
            if (currentY < canvas.height) {
                let progress = currentY / canvas.height;
                let speed = 0.2 + (progress * 2.0); 
                
                // Drawing PURE colors from the image
                ctx.drawImage(img, 0, currentY, canvas.width, speed, 0, currentY, canvas.width, speed);
                
                if (progress > (msgIndex + 1) / messages.length) {
                    dialogue.innerText = messages[msgIndex];
                    msgIndex++;
                }

                currentY += speed;
                requestAnimationFrame(render);
            } else {
                dialogue.innerText = "ACCESS GRANTED. PROCEED.";
            }
        }
        render();
    };
</script>
</body>
</html>
