<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DECRYPTING_GATEWAY</title>
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        #status-text { margin-bottom: 15px; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 5px #00ff41; }
        canvas { border: 1px solid #004400; box-shadow: 0 0 30px rgba(0, 255, 65, 0.2); max-width: 90vw; max-height: 80vh; }
    </style>
</head>
<body>
    <div id="status-text">Handshake Verified. Initializing Stream...</div>
    <canvas id="doorCanvas"></canvas>

<script>
    const canvas = document.getElementById('doorCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status-text');
    const img = new Image();

    // !!! CHANGE THIS TO MATCH YOUR FILENAME EXACTLY !!!
    img.src = 'door.png'; 

    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        let currentY = 0;
        
        function render() {
            if (currentY < canvas.height) {
                let progress = currentY / canvas.height;
                // Starts slow (0.3) and builds up to the climax
                let speed = 0.3 + (progress * 5); 

                ctx.drawImage(img, 0, currentY, canvas.width, speed, 0, currentY, canvas.width, speed);
                
                // Neon Scan Line
                ctx.fillStyle = '#00ff41';
                ctx.fillRect(0, currentY, canvas.width, 2);

                if (progress > 0.4 && progress < 0.7) status.innerText = "Reconstructing Visuals...";
                if (progress > 0.85) status.innerText = "CRITICAL: Finalizing Handshake...";

                currentY += speed;
                requestAnimationFrame(render);
            } else {
                status.innerText = "ACCESS GRANTED. WELCOME.";
                status.style.color = "#fff";
                canvas.style.filter = "brightness(1.5) contrast(1.2)";
            }
        }
        render();
    };
</script>
</body>
</html>
