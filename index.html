<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CORE BREACH</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff41;
    font-family:monospace;
    overflow:hidden;
}

/* -------- Scene 1 -------- */

#scene1{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.frame{
    position:relative;
    overflow:hidden;
    border:2px solid #111;
    background:#050505;
}

#door{
    max-width:85vw;
    max-height:70vh;
    display:block;
}

.mask{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#050505;
}

#dialogue{
    margin-bottom:20px;
    font-weight:bold;
}

/* -------- Fake OS -------- */

#fake-os{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    pointer-events:none;
}

.window{
    position:absolute;
    background:#111;
    border:1px solid #00ff41;
    padding:10px;
    box-shadow:0 0 20px #00ff41;
    font-size:14px;
}

.calc{ top:20%; left:20%; }
.folder{ top:45%; left:50%; }

/* glitch shake */
@keyframes glitch{
    0%{transform:translate(2px,0);}
    50%{transform:translate(-2px,0);}
    100%{transform:translate(2px,0);}
}

.glitch{
    animation:glitch 0.1s infinite;
}

/* -------- Scene 2 -------- */

#scene2{
    display:none;
    padding:20px;
}

input{
    background:black;
    border:1px solid #00ff41;
    color:#00ff41;
    font-family:monospace;
}

.flash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:red;
    opacity:0;
    pointer-events:none;
}
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<!-- SCENE 1 -->
<div id="scene1">
    <div id="dialogue">INITIALIZING...</div>
    <div class="frame">
        <img id="door" src="door.png">
        <div class="mask" id="mask"></div>
    </div>
</div>

<!-- FAKE OS WINDOWS -->
<div id="fake-os">
    <div class="window calc">CALCULATOR.exe<br><span id="calc-output"></span></div>
    <div class="window folder">Opening: C:\hidden\hacker.img</div>
</div>

<!-- SCENE 2 -->
<div id="scene2">
    <div id="header">
        [FATAL_ERROR] - CORE_MELTDOWN_PROCEDURE<br>
        STATUS: COOLING_OFFLINE // BLACKLISTING_ALL_USERS
    </div>
    <div id="system-log"></div>
    <div id="input-zone" style="display:none;">
        <div>> STABILIZE_CMD:</div>
        <input type="text" id="user-input">
    </div>
</div>

<script>

/* ================= SCENE 1 ================= */

const mask = document.getElementById("mask");
const dialogue = document.getElementById("dialogue");
const scene1 = document.getElementById("scene1");
const scene2 = document.getElementById("scene2");
const flash = document.getElementById("flash");

let progress = 100;

function reveal(){
    if(progress > 0){
        progress -= 0.4;
        mask.style.height = progress + "%";
        requestAnimationFrame(reveal);
    }else{
        dialogue.innerText="ACCESS GRANTED";
        setTimeout(beginGlitch,600);
    }
}

window.onload = reveal;

/* ================= GLITCH SEQUENCE ================= */

function beginGlitch(){
    document.body.classList.add("glitch");
    flash.style.opacity="0.7";
    setTimeout(()=>flash.style.opacity="0",200);
    setTimeout(showFakeOS,300);
}

function showFakeOS(){
    const fakeOS=document.getElementById("fake-os");
    const calc=document.getElementById("calc-output");

    fakeOS.style.display="block";

    let count=0;
    const interval=setInterval(()=>{
        calc.innerText=Math.floor(Math.random()*99999)+" ERROR";
        count++;
        if(count>15){
            clearInterval(interval);
            showCodeWall();
        }
    },80);
}

function showCodeWall(){
    document.getElementById("fake-os").innerHTML="";

    const wall=document.createElement("div");
    wall.style.position="fixed";
    wall.style.top=0;
    wall.style.left=0;
    wall.style.width="100%";
    wall.style.height="100%";
    wall.style.background="black";
    wall.style.color="#00ff41";
    wall.style.whiteSpace="pre";
    wall.style.fontSize="10px";
    wall.style.overflow="hidden";

    wall.innerText=generateCode();

    document.body.appendChild(wall);

    setTimeout(()=>{
        wall.remove();
        document.body.classList.remove("glitch");
        scene1.style.display="none";
        scene2.style.display="block";
        executeMeltdown();
    },1200);
}

function generateCode(){
    const chars="01#@$%&{}[]<>/\\";
    let text="";
    for(let i=0;i<3000;i++){
        text+=chars[Math.floor(Math.random()*chars.length)];
        if(i%80===0) text+="\n";
    }
    return text;
}

/* ================= SCENE 2 ================= */

const log=document.getElementById("system-log");
const inputZone=document.getElementById("input-zone");
const userInput=document.getElementById("user-input");

const logs=[
    "[SYSTEM_ERROR]: UNKNOWN CODE STRING DETECTED",
    "STATUS: CRITICAL // FIREWALL: [BLOCKED]",
    "CORE RELOCKED // COOLING FAILURE",
    "--------------------------------",
    "SCENARIO DATA LOADED",
    "CUSTOMERS ARRIVE 09:00",
    "TICKETS START 001",
    "LUNCH 12:00-13:00",
    "--------------------------------",
    "FINAL ATTEMPT TO STABILIZE CORE"
];

const puzzles=[
    {q:"Rachel (028) earliest arrival?",a:"11:15"},
    {q:"Sam (052) latest start?",a:"13:00"}
];

let puzzleIndex=0;

async function executeMeltdown(){
    for(let msg of logs){
        let div=document.createElement("div");
        div.innerText=">>> "+msg;
        log.appendChild(div);
        await new Promise(r=>setTimeout(r,700));
    }
    loadNext();
}

function loadNext(){
    if(puzzleIndex<puzzles.length){
        inputZone.style.display="block";
        userInput.placeholder=puzzles[puzzleIndex].q;
        userInput.focus();
    }else{
        document.body.innerHTML="<h1 style='color:#00ff41;text-align:center;padding-top:20%'>CORE STABILIZED</h1>";
    }
}

userInput.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
        if(userInput.value.trim()===puzzles[puzzleIndex].a){
            puzzleIndex++;
            userInput.value="";
            loadNext();
        }else{
            document.body.innerHTML="<h1 style='color:red;text-align:center;padding-top:20%'>SYSTEM FAILURE</h1>";
        }
    }
});

</script>
</body>
    <script>

/* ================= EXTRA ATMOSPHERIC ADD-ONS ================= */

// Background binary drift
function startBinaryDrift(){
    const drift = document.createElement("div");
    drift.style.position = "fixed";
    drift.style.top = 0;
    drift.style.left = 0;
    drift.style.width = "100%";
    drift.style.height = "100%";
    drift.style.pointerEvents = "none";
    drift.style.fontSize = "10px";
    drift.style.color = "rgba(0,255,65,0.05)";
    drift.style.whiteSpace = "pre";
    drift.style.zIndex = "0";

    function generateBinary(){
        let text = "";
        for(let i=0;i<2000;i++){
            text += Math.random() > 0.5 ? "1" : "0";
            if(i % 120 === 0) text += "\n";
        }
        return text;
    }

    drift.innerText = generateBinary();
    document.body.appendChild(drift);

    setInterval(()=>{
        drift.innerText = generateBinary();
    },4000);
}

startBinaryDrift();


// Random warning injector during meltdown
function randomWarnings(){
    const warnings = [
        "MEMORY LEAK DETECTED",
        "STACK OVERFLOW RISK",
        "UNAUTHORIZED THREAD SPAWNED",
        "KERNEL DESYNC",
        "SHADOW PROCESS ACTIVE",
        "OBSERVER NODE CONNECTED"
    ];

    setInterval(()=>{
        if(document.getElementById("scene2").style.display === "block"){
            const log = document.getElementById("system-log");
            if(log){
                let div = document.createElement("div");
                div.style.color = "#ff4444";
                div.innerText = ">>> WARNING: " + warnings[Math.floor(Math.random()*warnings.length)];
                log.appendChild(div);
            }
        }
    },5000);
}

randomWarnings();


// Subtle flicker instability
function instabilityFlicker(){
    setInterval(()=>{
        if(Math.random() > 0.85){
            document.body.style.opacity = "0.95";
            setTimeout(()=>document.body.style.opacity="1",100);
        }
    },2000);
}

instabilityFlicker();


// Hidden observer trigger (if user types a secret word)
document.addEventListener("keydown",(e)=>{
    if(e.key === "F9"){
        let div = document.createElement("div");
        div.style.position="fixed";
        div.style.bottom="10px";
        div.style.right="10px";
        div.style.color="#ff0000";
        div.style.fontSize="12px";
        div.innerText="[OBSERVER MODE ENABLED]";
        document.body.appendChild(div);
    }
});

</script>
</html>
