<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CORE BREACH</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff41;
    font-family:monospace;
    overflow:hidden;
}

/* ================= SCENE 1 ================= */

#scene1{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.frame{
    position:relative;
    overflow:hidden;
    border:2px solid #111;
    background:#050505;
}

#door{
    max-width:85vw;
    max-height:70vh;
    display:block;
}

.mask{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#050505;
}

#dialogue{
    margin-bottom:20px;
    font-weight:bold;
}

/* ================= FAKE OS ================= */

#fake-os{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    pointer-events:none;
}

.window{
    position:absolute;
    background:#111;
    border:1px solid #00ff41;
    padding:10px;
    box-shadow:0 0 20px #00ff41;
    font-size:14px;
}

.calc{ top:20%; left:20%; }
.folder{ top:45%; left:50%; }

/* glitch effect */
.glitch{
    animation:glitch 0.1s infinite;
}

@keyframes glitch{
    0%{transform:translate(2px,0);}
    50%{transform:translate(-2px,0);}
    100%{transform:translate(2px,0);}
}

/* ================= SCENE 2 ================= */

#scene2{
    display:none;
    padding:20px;
}

input{
    background:black;
    border:1px solid #00ff41;
    color:#00ff41;
    font-family:monospace;
}

.flash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:red;
    opacity:0;
    pointer-events:none;
}
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<!-- ================= SCENE 1 ================= -->

<div id="scene1">
    <div id="dialogue">INITIALIZING...</div>

    <div class="frame">
        <img id="door" src="door.png">
        <div class="mask" id="mask"></div>
    </div>
</div>

<!-- Fake OS Popups -->
<div id="fake-os">
    <div class="window calc">
        CALCULATOR.exe<br>
        <span id="calc-output"></span>
    </div>
    <div class="window folder">
        Opening: C:\hidden\hacker.img
    </div>
</div>

<!-- ================= SCENE 2 ================= -->

<div id="scene2">
    <div>
        [FATAL_ERROR] - CORE_MELTDOWN_PROCEDURE<br>
        STATUS: COOLING_OFFLINE // BLACKLISTING_ALL_USERS
    </div>

    <div id="system-log"></div>

    <div id="input-zone" style="display:none;">
        <div>> STABILIZE_CMD:</div>
        <input type="text" id="user-input">
    </div>
</div>

<script>

/* ================= SCENE 1 ================= */

const mask = document.getElementById("mask");
const dialogue = document.getElementById("dialogue");
const scene1 = document.getElementById("scene1");
const scene2 = document.getElementById("scene2");
const flash = document.getElementById("flash");

let progress = 100;

function reveal(){
    if(progress > 0){
        progress -= 0.8;
        if(progress < 0) progress = 0;
        mask.style.height = progress + "%";
        requestAnimationFrame(reveal);
    }else{
        dialogue.innerText = "ACCESS GRANTED";
        setTimeout(()=> beginGlitch(),500);
    }
}

window.onload = reveal;

/* ================= GLITCH TRANSITION ================= */

function beginGlitch(){
    document.body.classList.add("glitch");

    flash.style.opacity="0.8";
    setTimeout(()=> flash.style.opacity="0",200);

    setTimeout(()=> showFakeOS(),300);
}

/* ================= FAKE OS BREACH ================= */

function showFakeOS(){
    const fakeOS = document.getElementById("fake-os");
    const calc = document.getElementById("calc-output");

    fakeOS.style.display="block";

    let count = 0;
    const interval = setInterval(()=>{
        calc.innerText = Math.floor(Math.random()*99999) + " ERROR";
        count++;
        if(count > 15){
            clearInterval(interval);
            showCodeWall();
        }
    },80);
}

/* ================= CODE WALL ================= */

function showCodeWall(){

    document.getElementById("fake-os").innerHTML = "";

    const wall = document.createElement("div");
    wall.style.position="fixed";
    wall.style.top=0;
    wall.style.left=0;
    wall.style.width="100%";
    wall.style.height="100%";
    wall.style.background="black";
    wall.style.color="#00ff41";
    wall.style.fontSize="10px";
    wall.style.whiteSpace="pre";
    wall.style.overflow="hidden";
    wall.style.zIndex="999";

    wall.innerText = generateCode();

    document.body.appendChild(wall);

    setTimeout(()=>{
        wall.remove();
        document.body.classList.remove("glitch");
        scene1.style.display="none";
        scene2.style.display="block";
        executeMeltdown();
    },1200);
}

function generateCode(){
    const chars="01#@$%&{}[]<>/\\";
    let text="";
    for(let i=0;i<2500;i++){
        text+=chars[Math.floor(Math.random()*chars.length)];
        if(i % 80 === 0) text+="\n";
    }
    return text;
}

/* ================= SCENE 2 ================= */

const log = document.getElementById("system-log");
const inputZone = document.getElementById("input-zone");
const userInput = document.getElementById("user-input");

const logs = [
    "[SYSTEM_ERROR]: UNKNOWN CODE STRING DETECTED",
    "STATUS: CRITICAL // FIREWALL: [BLOCKED]",
    "CORE RELOCKED // COOLING FAILURE",
    "--------------------------------",
    "SCENARIO DATA:",
    "Customers arrive at 09:00.",
    "Tickets start at 001.",
    "Appointments last 5-10 minutes.",
    "Lunch break 12:00 - 13:00.",
    "--------------------------------",
    "FINAL ATTEMPT TO STABILIZE CORE"
];

const puzzles = [
    {q:"Rachel (028) earliest arrival?", a:"11:15"},
    {q:"Sam (052) latest start?", a:"13:00"},
    {q:"Tommy (063) minutes to wait?", a:"75"},
    {q:"Tommy (063) largest minutes?", a:"160"},
    {q:"Mean wait time for Tommy?", a:"117.5"}
];

let puzzleIndex = 0;

async function executeMeltdown(){
    for(let msg of logs){
        let div = document.createElement("div");
        div.innerText = ">>> " + msg;
        log.appendChild(div);
        await new Promise(r => setTimeout(r,700));
    }
    loadPuzzle();
}

function loadPuzzle(){
    if(puzzleIndex < puzzles.length){
        inputZone.style.display="block";
        userInput.placeholder = puzzles[puzzleIndex].q;
        userInput.focus();
    }else{
        document.body.innerHTML =
        "<h1 style='color:#00ff41;text-align:center;padding-top:20%'>CORE STABILIZED</h1>";
    }
}

userInput.addEventListener("keydown",(e)=>{
    if(e.key === "Enter"){
        if(userInput.value.trim() === puzzles[puzzleIndex].a){
            puzzleIndex++;
            userInput.value="";
            loadPuzzle();
        }else{
            document.body.innerHTML =
            "<h1 style='color:red;text-align:center;padding-top:20%'>SYSTEM FAILURE</h1>";
        }
    }
});

</script>

</body>
</html>
