<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { max-width: 95vw; max-height: 95vh; }
    </style>
</head>
<body>
    <canvas id="doorCanvas"></canvas>
<script>
    const canvas = document.getElementById('doorCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'door.webp'; 

    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        let currentY = 0;
        
        function render() {
            if (currentY < canvas.height) {
                // Inch by inch building speed
                let speed = 0.2 + ((currentY / canvas.height) * 3); 
                
                // Draws the actual colors of your image
                ctx.drawImage(img, 0, currentY, canvas.width, speed, 0, currentY, canvas.width, speed);
                
                currentY += speed;
                requestAnimationFrame(render);
            }
        }
        render();
    };
</script>
</body>
</html>
