<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Act 1 - System Boot</title>

<style>

body{
    margin:0;
    background:black;
    color:#00ff41;
    font-family:monospace;
    overflow:hidden;
}

/* Loading Screen */

#loading{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
}

/* Main Scene */

#scene{
    display:none;
    padding:40px;
}

/* Image */

#image-container{
    width:400px;
    height:400px;
    border:2px solid #222;
    background:#050505;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:30px;
}

#image-container img{
    max-width:100%;
    max-height:100%;
    opacity:0;
    transition:2s;
}

.show-image{
    opacity:1 !important;
}

/* Terminal */

#terminal{
    border:1px solid #00ff41;
    padding:20px;
    height:150px;
    overflow:hidden;
    white-space:pre-wrap;
    margin-bottom:30px;
}

/* Glitch */

.glitch{
    animation:shake 0.1s infinite;
    color:red;
}

@keyframes shake{
    0%{transform:translate(2px,0);}
    50%{transform:translate(-2px,0);}
    100%{transform:translate(2px,0);}
}

/* Questions Section */

#questions{
    display:none;
    border:1px solid #00ff41;
    padding:20px;
    margin-top:30px;
}

.question{
    margin-bottom:15px;
}

button{
    background:#00ff41;
    border:none;
    padding:12px 25px;
    font-family:monospace;
    cursor:pointer;
    margin-top:20px;
}

</style>
</head>
<body>

<!-- LOADING -->

<div id="loading">SYSTEM BOOTING...</div>

<!-- MAIN SCENE -->

<div id="scene">

<div id="image-container">
<img id="man" src="hacker.png"
onerror="this.parentElement.innerHTML='IMAGE FAILED TO LOAD'">
</div>

<div id="terminal"></div>

<div id="questions">

<h2>SCENARIO QUESTIONS</h2>

<div class="question">
A) Earliest possible time? — <b>11:15</b>
</div>

<div class="question">
B) Latest possible time? — <b>14:30</b>
</div>

<div class="question">
C) Lowest ticket at 11:45? — <b>018</b>
</div>

<div class="question">
D) Highest ticket at 11:45? — <b>034</b>
</div>

<button onclick="goNext()">ENTER SYSTEM</button>

</div>

</div>

<script>

/* ---------------- REFERENCES ---------------- */

const loading = document.getElementById("loading");
const scene = document.getElementById("scene");
const terminal = document.getElementById("terminal");
const image = document.getElementById("man");
const questions = document.getElementById("questions");

/* ---------------- SEQUENCE ---------------- */

setTimeout(()=>{

loading.innerText = "INITIALIZING CORE...";

scene.style.display="block";

},2000);


/* IMAGE REVEAL */

setTimeout(()=>{

image.classList.add("show-image");

terminal.innerHTML += "IMAGE ENTITY DETECTED...\n";

},4000);


/* SYSTEM ERRORS */

setTimeout(()=>{

terminal.innerHTML += "LOADING FILES...\n";
terminal.classList.add("glitch");

},6000);


/* SYSTEM BREACH */

setTimeout(()=>{

terminal.innerHTML += "ERROR: MEMORY CORRUPTION\nERROR: CORE INSTABILITY\n";

},8000);


/* MAN REVEAL COMPLETE */

setTimeout(()=>{

terminal.classList.remove("glitch");
terminal.innerHTML += "\nENTITY FULLY ACTIVATED\n";

/* Show Questions After Drama */

questions.style.display="block";

},11000);


/* REDIRECT TO ACT 2 */

function goNext(){
    window.location.href="act2.html";
}

</script>

</body>
</html>
