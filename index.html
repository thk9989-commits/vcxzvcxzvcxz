<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gateway</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: monospace;
    color: #00ff41;
}

/* Terminal header */
#header {
    width: 80%;
    margin-bottom: 15px;
    font-size: 14px;
    border-left: 3px solid #00ff41;
    padding-left: 10px;
}

/* Dialogue */
#dialogue {
    height: 30px;
    margin-bottom: 20px;
    font-weight: bold;
}

/* Frame */
.frame {
    position: relative;
    overflow: hidden;
    border: 2px solid #222;
    background: #050505;
}

/* Image */
#door {
    display: block;
    max-width: 85vw;
    max-height: 70vh;
}

/* Mask overlay */
.mask {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #050505;
}
</style>
</head>
<body>

<div id="header">
NODE: 127.0.0.1<br>
STATUS: INITIALIZING...
</div>

<div id="dialogue">BOOTING...</div>

<div class="frame">
    <img id="door" src="door.png">
    <div class="mask" id="mask"></div>
</div>

<script>
const mask = document.getElementById("mask");
const dialogue = document.getElementById("dialogue");

const messages = [
    "Tracing Route...",
    "Handshake Success...",
    "Decrypting...",
    "Firewall Disabled...",
    "Reconstructing Image...",
    "Integrity Check: OK",
    "Finalizing..."
];

let progress = 100;
let msgIndex = 0;

function reveal() {
    if (progress > 0) {
        progress -= 0.3;
        mask.style.height = progress + "%";

        const percentShown = 100 - progress;
        const trigger = Math.floor((percentShown / 100) * messages.length);

        if (trigger > msgIndex && msgIndex < messages.length) {
            dialogue.textContent = messages[msgIndex];
            msgIndex++;
        }

        requestAnimationFrame(reveal);
    } else {
        dialogue.textContent = "ACCESS GRANTED";
        dialogue.style.color = "#ffffff";
    }
}

window.onload = () => {
    reveal();
};
</script>

</body>
</html>
